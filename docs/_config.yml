title: Hytale Modding Handbook
description: >-
  A Hytale server-plugin & asset API reference — the descriptions, gotchas,
  and working examples the official auto-generated reference doesn't have.
url: https://inkthorne.github.io
baseurl: /hytale-modding-handbook

# Theme: just-the-docs (sidebar nav + built-in search), pinned for GitHub Pages compatibility
remote_theme: just-the-docs/just-the-docs@v0.7.0

plugins:
  - jekyll-remote-theme
  - jekyll-sitemap

# just-the-docs options
search_enabled: true
heading_anchors: true
aux_links:
  "GitHub Repo":
    - "https://github.com/inkthorne/hytale-modding-handbook"
aux_links_new_tab: true
